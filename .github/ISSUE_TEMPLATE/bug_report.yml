name: Bug report
description: Report reproducible Samosa behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach private footage, project files, logs, or credentials.
  - type: input
    id: version
    attributes:
      label: Samosa version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Windows version, After Effects version, GPU, and Sammie-Roto-2 revision
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
