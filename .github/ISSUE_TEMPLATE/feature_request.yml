name: Feature request
description: Propose a focused Samosa improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: Describe the After Effects workflow that is currently difficult.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: licensing
    attributes:
      label: New dependencies or models
      description: List any proposed dependency and its code and model licenses.
